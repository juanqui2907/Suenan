<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0f0f0f" />
  <title>Reflexiones, Chistes & Piropos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #222222;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.15);
      --text: #f0ede8;
      --text2: #9a9590;
      --text3: #5a5652;
      --accent-gold: #c9a84c;
      --accent-pink: #c4547a;
      --accent-green: #4a9e7a;
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overscroll-behavior: none;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* HEADER */
    .header {
      padding: 20px 20px 0;
      flex-shrink: 0;
    }

    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 16px;
    }

    /* TABS */
    .tabs {
      display: flex;
      gap: 6px;
      padding: 0 20px 16px;
      flex-shrink: 0;
    }

    .tab-btn {
      flex: 1;
      padding: 9px 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.2px;
    }

    .tab-btn.active {
      background: var(--surface2);
      border-color: var(--border2);
      color: var(--text);
      font-weight: 500;
    }

    /* SECTIONS */
    .section {
      display: none;
      flex: 1;
      overflow: hidden;
      flex-direction: column;
    }

    .section.active { display: flex; }

    /* ── REFLEXIONES ── */
    .card-stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 20px 24px;
      gap: 20px;
    }

    .card-counter {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text3);
    }

    .card-wrap {
      width: 100%;
      flex: 1;
      max-height: 400px;
      position: relative;
    }

    .poem-line {
      display: block;
      line-height: 1.75;
    }

    .poem-gap {
      display: block;
      height: 0.6em;
    }

    .card {
      position: absolute;
      inset: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      cursor: pointer;
      user-select: none;
      touch-action: pan-y;
      overflow-y: auto;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 60px; height: 2px;
      background: var(--accent-gold);
      border-radius: 0 0 2px 2px;
      opacity: 0.7;
    }

    .quote-mark {
      font-family: 'Playfair Display', serif;
      font-size: 64px;
      line-height: 0.4;
      color: var(--accent-gold);
      opacity: 0.3;
      margin-bottom: 20px;
      align-self: flex-start;
    }

    .card-text {
      font-family: 'Playfair Display', serif;
      font-size: 19px;
      font-style: italic;
      line-height: 1.7;
      color: var(--text);
    }

    .card-cat {
      margin-top: 24px;
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent-gold);
      opacity: 0.6;
    }

    .nav-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .nav-btn {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .nav-btn:active { transform: scale(0.92); background: var(--surface2); }

    .shuffle-btn {
      padding: 11px 24px;
      border-radius: 999px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text2);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .shuffle-btn:active { background: var(--surface2); color: var(--text); }

    .dots {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--border2);
      cursor: pointer;
      transition: all 0.2s;
    }

    .dot.active {
      background: var(--accent-gold);
      width: 16px;
      border-radius: 3px;
    }

    /* ── SCROLL SECTIONS (chistes & piropos) ── */
    .scroll-section {
      flex: 1;
      overflow-y: auto;
      padding: 4px 20px 32px;
      -webkit-overflow-scrolling: touch;
    }

    .scroll-section::-webkit-scrollbar { display: none; }

    .sec-label {
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 16px;
    }

    .item-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 20px;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
    }

    .item-card::after {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
    }

    .item-card.chiste::after { background: var(--accent-gold); }
    .item-card.piropo::after { background: var(--accent-pink); }

    .item-emoji { font-size: 22px; margin-bottom: 10px; display: block; }

    .item-setup {
      font-size: 15px;
      line-height: 1.6;
      color: var(--text2);
      margin-bottom: 12px;
    }

    .reveal-btn {
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--accent-gold);
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.2);
      padding: 7px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }

    .reveal-btn:active { background: rgba(201,168,76,0.18); }

    .punchline {
      display: none;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.55;
    }

    .punchline.shown { display: block; }

    .piropo-text {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-style: italic;
      line-height: 1.75;
      color: var(--text);
    }

    /* Card animations */
    @keyframes fadeSlideLeft {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(-28px); }
    }
    @keyframes fadeSlideRight {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(28px); }
    }
    @keyframes fadeInLeft {
      from { opacity: 0; transform: translateX(28px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeInRight {
      from { opacity: 0; transform: translateX(-28px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .out-left  { animation: fadeSlideLeft  0.2s ease forwards; }
    .out-right { animation: fadeSlideRight 0.2s ease forwards; }
    .in-left   { animation: fadeInLeft     0.22s ease forwards; }
    .in-right  { animation: fadeInRight    0.22s ease forwards; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-title">Palabras que suenan</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('reflexiones')">Reflexiones</button>
    <button class="tab-btn" onclick="switchTab('chistes')">Chistes</button>
    <button class="tab-btn" onclick="switchTab('piropos')">Piropos</button>
  </div>

  <!-- REFLEXIONES -->
  <div class="section active" id="sec-reflexiones">
    <div class="card-stage">
      <div class="card-counter" id="counter">1 / 25</div>
      <div class="card-wrap">
        <div class="card" id="the-card">
          <div class="quote-mark">"</div>
          <div class="card-text" id="card-text"></div>
          <div class="card-cat" id="card-cat"></div>
        </div>
      </div>
      <div class="nav-row">
        <button class="nav-btn" onclick="nextCard(-1)">←</button>
        <button class="shuffle-btn" onclick="shuffleCard()">Al azar</button>
        <button class="nav-btn" onclick="nextCard(1)">→</button>
      </div>
      <div class="dots" id="dots"></div>
    </div>
  </div>

  <!-- CHISTES -->
  <div class="section" id="sec-chistes">
    <div class="scroll-section">
      <div class="sec-label">Toca para ver el remate</div>
      <div id="chistes-list"></div>
    </div>
  </div>

  <!-- PIROPOS -->
  <div class="section" id="sec-piropos">
    <div class="scroll-section">
      <div class="sec-label">Del corazón pa' los oídos</div>
      <div id="piropos-list"></div>
    </div>
  </div>
</div>

<script>
const reflexiones = [
  { text: "Puedo con el agotamiento físico, pero el emocional me está matando.", cat: "reflexión personal" },
  { text: "El que sube como palma, baja como coco.", cat: "sabiduría popular" },
  { text: "La mala noticia es que todo es temporal. La buena noticia es que todo es temporal.", cat: "filosofía de vida" },
  { text: "Me enseñaste a trabajar duro, a no tener pena y saber que lo que tengo es porque yo mismo me lo gané.", cat: "gratitud" },
  { text: "Voy a seguir y trabajaré tan duro, hasta que llegue el día en que escuche a mi familia decir: ese pelado salió adelante y cumplió todo lo que un día nos contó.", cat: "motivación" },
  {
    lines: [
      "si vuelves,",
      "todo mi mundo se desordena.",
      "",
      "si me hablas,",
      "mis defensas caen.",
      "",
      "si caen mis defensas,",
      "mis emociones me atrapan.",
      "",
      "y si me atrapan,",
      "te vuelvo a amar...",
      "",
      "y si te vuelvo a amar...",
      "quizás esta vez",
      "no logre volver a levantarme."
    ],
    cat: "reflexión"
  },
  {
    lines: [
      "me vi y dije: este no soy yo.",
      "¿dónde quedó mi felicidad?",
      "¿dónde quedó el brillo de mis ojos?",
      "¿dónde mierda quedé yo?",
      "",
      "solo quiero volver a ser yo."
    ],
    cat: "reflexión personal"
  },
  {
    lines: [
      "llevo días sin ser yo",
      "y nadie lo ha notado,",
      "porque siempre me ven feliz.",
      "",
      "pero en realidad yo necesito",
      "un abrazo sincero",
      "y llorar sin dar explicaciones."
    ],
    cat: "reflexión personal"
  },
  {
    lines: [
      "cuando pienso en todo lo que me está pasando",
      "y de repente siento las piernas inquietas,",
      "se me hace difícil respirar,",
      "siento un vacío en el pecho",
      "y unas ganas de llorar",
      "mientras siento que todo se viene abajo",
      "sin razón."
    ],
    cat: "reflexión personal"
  },
  { text: "Soy como soy porque me duele gastar 50 en mí, pero no me dolería gastar 500 en alguien que me importa de verdad.", cat: "reflexión" },
  {
    lines: [
      "donde pongo el ojo...",
      "no le gusté,",
      "no supera a su ex,",
      "me deja de hablar,",
      "se habla con 10",
      "o no sabe lo que quiere."
    ],
    cat: "reflexión"
  },
  { text: "Hay comportamientos que simplemente no merecen conversación. Merecen distancia.", cat: "reflexión" },
  { text: "Ya se me quitó el complejo de salvavidas. Ahóguense todos.", cat: "reflexión" },
  { text: "Nunca dudes en un día decirme «me siento mal», porque por más que yo esté peor, siempre voy a estar ahí para ti.", cat: "reflexión" },
  {
    lines: [
      "pros y contras de estar conmigo.",
      "",
      "pros: moriría de amor por ti.",
      "contras: moriría de amor por ti."
    ],
    cat: "reflexión"
  },
  { text: "Pues sí me ilusioné, pero también era la primera vez en dos años que sentí que todo iba a ser diferente.", cat: "reflexión" },
  { text: "Soy una persona muy observadora, así que sí lo vi, sí lo sentí, sí lo noté, sí lo capté, sí lo entendí, sí me di cuenta, sí lo escuché. Solo preferí fingir que no lo hice.", cat: "reflexión" },
  { text: "Las personas con problemas de salud mental que se aíslan cuando se sienten agobiadas, por lo general tuvieron que resolver muchos problemas por sí solos cuando eran niños.", cat: "reflexión" },
  { text: "Hay una diferencia entre la disfunción ejecutiva y la pereza. Si realmente fueras perezoso, la estarías pasando bien; no te sentirías enfermo del estómago por la vergüenza, la culpa y la ansiedad.", cat: "reflexión" },
  { text: "Después de que empieces a sanar traumas pasados y salgas del modo de lucha o huida, tu cuerpo necesitará mucho descanso. No eres perezoso; tu cuerpo solo está tratando de recuperar la calma que no ha recibido en años.", cat: "reflexión" },
  { text: "Llevo toda mi vida escuchando que soy el tipo de persona con la que cualquiera quisiera estar, pero aún no conozco a la primera persona que se quede.", cat: "reflexión personal" },
  { text: "Si alguna vez me voy de este mundo, espero que la gente que conocí mire al sol y piense en mí, porque siempre intenté que mi personalidad brille para que olviden su oscuridad.", cat: "reflexión" },
  { text: "El diablo no pudo alcanzarme, entonces me ocupó escuchar que tengo buen corazón, que valgo mucho y que merezco lo mejor. Pero nadie elige quedarse.", cat: "reflexión personal" },
  { text: "Lo malo de ser emocionalmente inteligente es que puedo dar mil razones por las que debería odiar a alguien, pero los he analizado tanto que entiendo por qué actúan como actúan. Así que realmente ni siquiera puedo enojarme.", cat: "reflexión" },
];

const chistes = [
  { emoji: "🏪", setup: "— Apártame todo.", punchline: "— Con gusto. ¡Pero de mi vista!" },
  { emoji: "✏️", setup: "— ¿Venden útiles escolares?", punchline: "— Sí señor. ¿Cuáles le sirven?" },
  { emoji: "💸", setup: "— ¿Qué precio tiene?", punchline: "— Pa' saber cuánto me ahorro." },
];

const piropos = [
  { text: "Oye, estaba estudiando inglés y confundí un pasado simple con un presente... contigo." },
  { text: "¿Cómo puedes tener dos corazones? El tuyo... y el mío." },
  { text: "¿Qué dinosaurio te gustaba montar cuando eras pequeño?" },
  { text: "¿Dónde viviste mejor, en el Antiguo Testamento o en el Nuevo Testamento?" },
  { text: "Tanta agua y tú ni así te bañas." },
];

let currentIdx = 0;

function renderCard() {
  const r = reflexiones[currentIdx];
  const el = document.getElementById('card-text');
  if (r.lines) {
    el.innerHTML = r.lines.map(l => l === '' ? '<span class="poem-gap"></span>' : '<span class="poem-line">' + l + '</span>').join('');
    el.style.fontSize = '15px';
    el.style.textAlign = 'left';
    el.style.alignSelf = 'flex-start';
  } else {
    el.textContent = r.text;
    el.style.fontSize = '';
    el.style.textAlign = '';
    el.style.alignSelf = '';
  }
  document.getElementById('card-cat').textContent = r.cat;
  document.getElementById('counter').textContent = (currentIdx + 1) + ' / ' + reflexiones.length;
  buildDots();
}

function buildDots() {
  const c = document.getElementById('dots');
  c.innerHTML = '';
  reflexiones.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === currentIdx ? ' active' : '');
    d.onclick = () => goToCard(i);
    c.appendChild(d);
  });
}

function animateCard(dir, cb) {
  const card = document.getElementById('the-card');
  const outCls = dir > 0 ? 'out-left' : 'out-right';
  const inCls  = dir > 0 ? 'in-left'  : 'in-right';
  card.classList.add(outCls);
  card.addEventListener('animationend', () => {
    card.classList.remove(outCls);
    cb();
    card.classList.add(inCls);
    card.addEventListener('animationend', () => card.classList.remove(inCls), { once: true });
  }, { once: true });
}

function nextCard(dir) {
  const newIdx = (currentIdx + dir + reflexiones.length) % reflexiones.length;
  animateCard(dir, () => { currentIdx = newIdx; renderCard(); });
}

function goToCard(i) {
  if (i === currentIdx) return;
  const dir = i > currentIdx ? 1 : -1;
  animateCard(dir, () => { currentIdx = i; renderCard(); });
}

function shuffleCard() {
  let newIdx;
  do { newIdx = Math.floor(Math.random() * reflexiones.length); } while (newIdx === currentIdx && reflexiones.length > 1);
  const dir = newIdx > currentIdx ? 1 : -1;
  animateCard(dir, () => { currentIdx = newIdx; renderCard(); });
}

// Swipe support
let touchStartX = 0;
document.getElementById('the-card').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
document.getElementById('the-card').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 40) nextCard(dx < 0 ? 1 : -1);
});

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['reflexiones','chistes','piropos'][i] === name);
  });
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
}

function togglePunchline(btn) {
  const pl = btn.nextElementSibling;
  const shown = pl.classList.toggle('shown');
  btn.textContent = shown ? 'Ocultar' : 'Ver el remate';
}

function buildChistes() {
  const list = document.getElementById('chistes-list');
  chistes.forEach(c => {
    const div = document.createElement('div');
    div.className = 'item-card chiste';
    div.innerHTML = `
      <span class="item-emoji">${c.emoji}</span>
      <div class="item-setup">${c.setup}</div>
      <button class="reveal-btn" onclick="togglePunchline(this)">Ver el remate</button>
      <div class="punchline">${c.punchline}</div>
    `;
    list.appendChild(div);
  });
}

function buildPiropos() {
  const list = document.getElementById('piropos-list');
  piropos.forEach(p => {
    const div = document.createElement('div');
    div.className = 'item-card piropo';
    div.innerHTML = `<div class="piropo-text">${p.text}</div>`;
    list.appendChild(div);
  });
}

renderCard();
buildChistes();
buildPiropos();
</script>
</body>
</html>
